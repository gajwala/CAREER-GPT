services:
  - type: web
    name: career-gpt-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
